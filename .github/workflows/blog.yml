name: Auto Blog

on:
  schedule:
    - cron: "0 3 * * *"     # ~08:30 IST
    - cron: "0 7 * * *"     # ~12:30 IST
    - cron: "0 11 * * *"    # ~16:30 IST
    - cron: "0 15 * * *"    # ~20:30 IST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Write an article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          SITE_TITLE: ${{ vars.SITE_TITLE }}
          SITE_TAGLINE: ${{ vars.SITE_TAGLINE }}
        run: python main.py
      - name: Publish to GitHub Pages (commit /docs)
        if: always()
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add docs state.json || true
          git commit -m "post: new article [skip ci]" || echo "no change"
          git push || echo "nothing to push"
