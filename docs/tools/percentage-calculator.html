</style></head><body><header class="site"><div class="wrap"><a href="../index.html"><h1>Smart Daily Tips</h1></a><p style="margin-top:8px"><a href="../index.html">Home</a> &nbsp;|&nbsp; <a href="index.html">All Tools</a></p></div></header><main class="wrap"><div class="tool"><h1 class="title">Percentage Calculator - Easy % Maths</h1>
<p>Quick percentage calculator for everyday maths.</p>
<label>What is X% of Y?</label>
<div class="row"><div><input id="x" type="number" value="20" placeholder="X%"></div>
<div><input id="y2" type="number" value="1500" placeholder="Y"></div></div>
<button onclick="pct()">Calculate</button>
<div id="po" class="result" style="display:none"></div>
<script>
function pct(){var v=(+x.value)/100*(+y2.value);
po.style.display='block';
po.innerHTML=x.value+'% of '+y2.value+' = <b>'+(Math.round(v*100)/100)+'</b>';}
pct();
</script><p style="margin-top:24px"><a href="index.html">&larr; All calculators</a></p></div></main><footer>&copy; Smart Daily Tips. For information purposes only.</footer></body></html>
