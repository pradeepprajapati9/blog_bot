<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Age Calculator - Find Your Exact Age</title><meta name="description" content="Free age calculator: find your exact age in years, months and days from your date of birth."><link rel="stylesheet" href="../style.css"></head><body><header class="site"><div class="wrap"><a href="../index.html"><h1>Smart Daily Tips</h1></a><p class="tag">Practical tips, tech &amp; money guides for everyday life</p><nav><a href="../index.html">Home</a><a href="index.html">Free Tools</a></nav></div></header><main class="wrap"><div class="tool"><h1 class="title">Age Calculator - Find Your Exact Age</h1>
<p>Find your exact age in years, months and days from your date of birth.</p>
<label>Date of Birth</label><input id="dob" type="date">
<button onclick="age()">Calculate Age</button>
<div id="ao" class="result" style="display:none"></div>
<script>
function age(){if(!dob.value){return}
var b=new Date(dob.value),t=new Date();
var y=t.getFullYear()-b.getFullYear(),m=t.getMonth()-b.getMonth(),d=t.getDate()-b.getDate();
if(d<0){m--;d+=new Date(t.getFullYear(),t.getMonth(),0).getDate()}
if(m<0){y--;m+=12}
ao.style.display='block';
ao.innerHTML='Your age: <b>'+y+' years, '+m+' months, '+d+' days</b>';}
</script><p style="margin-top:24px"><a href="index.html">&larr; All calculators</a></p></div></main><footer>&copy; Smart Daily Tips. For information purposes only.</footer></body></html>
