<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GST Calculator - Add or Remove GST (India)</title><meta name="description" content="Free GST calculator for India: add or remove 5%, 12%, 18% or 28% GST from any amount instantly."><link rel="stylesheet" href="../style.css"></head><body><header class="site"><div class="wrap"><a href="../index.html"><h1>Smart Daily Tips</h1></a><p class="tag">Practical tips, tech &amp; money guides for everyday life</p><nav><a href="../index.html">Home</a><a href="index.html">Free Tools</a></nav></div></header><main class="wrap"><div class="tool"><h1 class="title">GST Calculator - Add or Remove GST (India)</h1>
<p>Add or remove GST from any amount. Supports 5%, 12%, 18% and 28% slabs.</p>
<label>Amount (Rs.)</label><input id="amt" type="number" value="1000">
<div class="row"><div><label>GST Rate (%)</label>
<select id="gr"><option>5</option><option selected>18</option><option>12</option>
<option>28</option></select></div>
<div><label>Type</label><select id="gt"><option value="add">Add GST</option>
<option value="rem">Remove GST</option></select></div></div>
<button onclick="gst()">Calculate</button>
<div id="go" class="result" style="display:none"></div>
<script>
function f3(n){return '₹'+(Math.round(n*100)/100).toLocaleString('en-IN')}
function gst(){var a=+amt.value,r=+gr.value;
var base,tax,total;
if(gt.value=='add'){base=a;tax=a*r/100;total=a+tax}
else{base=a*100/(100+r);tax=a-base;total=a}
go.style.display='block';
go.innerHTML='GST Amount: <b>'+f3(tax)+'</b><br>Base Amount: '+f3(base)+
'<br>Total: '+f3(total);}
gst();
</script><p style="margin-top:24px"><a href="index.html">&larr; All calculators</a></p></div></main><footer>&copy; Smart Daily Tips. For information purposes only.</footer></body></html>
